<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Reactive Black Hole</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div id="ui-container">
      <div class="header">
        <h1>Singularity</h1>
        <p>Audio Reactive Particle System</p>
      </div>

      <div class="controls">
        <label for="audio-upload" class="upload-btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          Select Audio File
        </label>
        <input type="file" id="audio-upload" accept="audio/*" />

        <audio id="audio-element" controls></audio>

        <div id="status-message">Awaiting audio input...</div>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
