<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Reactive Black Hole</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="canvas-3d-container" style="display: none; position: absolute; top:0; left:0; width:100%; height:100%; z-index:1;"></div>

    <!-- Settings Toggle Button -->
    <button id="ui-toggle-btn" class="ui-toggle-btn" title="Toggle Controls">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>

    <div id="ui-container">
      <div class="panel-content">
        <div class="header">
          <h1>Singularity</h1>
          <p>Audio Reactive Particle System</p>
        </div>

        <div class="controls">
        <label for="audio-upload" class="upload-btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          Select Audio File
        </label>
        <input type="file" id="audio-upload" accept="audio/*" />

        <button id="mode-toggle" class="upload-btn">
          View 3D Version
        </button>

        <div class="settings-panel">
          <div class="setting-row">
            <span class="setting-label">Particle Density</span>
            <input type="range" id="particle-count" min="500" max="5000" value="2000" step="500">
          </div>
          <div class="setting-row">
            <span class="setting-label">Idle Speed</span>
            <input type="range" id="base-speed" min="0" max="2" value="0.2" step="0.1">
          </div>
          <div class="setting-row">
            <span class="setting-label">Audio Sensitivity</span>
            <input type="range" id="audio-sensitivity" min="0" max="3" value="1.0" step="0.1">
          </div>
          <div class="setting-row">
            <span class="setting-label">Streak Length</span>
            <input type="range" id="streak-length" min="0.5" max="5.0" value="2.0" step="0.1">
          </div>
        </div>

        <audio id="audio-element" controls></audio>

        <div id="status-message">Awaiting audio input...</div>
      </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Main Application Logic (2D & 3D) -->
    <script src="js/script.js"></script>
    <script src="js/script3d.js"></script>
    
    <!-- Mode Toggling Logic -->
    <script>
      const c2d = document.getElementById('canvas');
      const c3dContainer = document.getElementById('canvas-3d-container');
      const modeBtn = document.getElementById('mode-toggle');

        modeBtn.addEventListener('click', () => {
          if (window.currentMode === '2D') {
              window.currentMode = '3D';
              c2d.style.display = 'none';
              c3dContainer.style.display = 'block';
              modeBtn.textContent = 'View 2D Version';
          } else {
              window.currentMode = '2D';
              c3dContainer.style.display = 'none';
              c2d.style.display = 'block';
              modeBtn.textContent = 'View 3D Version';
          }
          // Dispatch resize for Three.js so whichever canvas is newly shown recalculates properly
          window.dispatchEvent(new Event('resize'));
      });
    </script>
  </body>
</html>
